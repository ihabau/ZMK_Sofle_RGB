name: Build ZMK Firmware

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: West Init
        run: |
          pip3 install west
          west init -l config
          west update
          west zephyr-export

      - name: Build Left Half
        run: |
          west build -s zmk/app -b nice_nano_v2 -- \
            -DSHIELD="sofle_left nice_oled" \
            -DCONFIG_ZMK_STUDIO=y \
            -DZMK_CONFIG="config"
        env:
          ZMK_CONFIG: config

      - name: Rename Left Firmware
        run: cp build/zephyr/zmk.uf2 sofle_left.uf2

      - name: Clean Build
        run: rm -rf build

      - name: Build Right Half
        run: |
          west build -s zmk/app -b nice_nano_v2 -- \
            -DSHIELD="sofle_right nice_oled" \
            -DZMK_CONFIG="config"
        env:
          ZMK_CONFIG: config

      - name: Rename Right Firmware
        run: cp build/zephyr/zmk.uf2 sofle_right.uf2

      - name: Build Settings Reset
        run: |
          rm -rf build
          west build -s zmk/app -b nice_nano_v2 -- \
            -DSHIELD="settings_reset" \
            -DZMK_CONFIG="config"
        env:
          ZMK_CONFIG: config

      - name: Rename Settings Reset
        run: cp build/zephyr/zmk.uf2 settings_reset.uf2

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            sofle_left.uf2
            sofle_right.uf2
            settings_reset.uf2

  create_release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.date.outputs.date }}-${{ github.sha }}
          name: Firmware ${{ steps.date.outputs.date }}
          body: Build from commit ${{ github.sha }}
          files: |
            sofle_left.uf2
            sofle_right.uf2
            settings_reset.uf2
